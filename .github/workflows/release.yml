name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'YT Float ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            極省資源、永遠最上層的迷你追劇視窗（YouTube / Netflix / Bilibili）。

            下載對應平台的檔案：
            - **Windows**：`...portable-x64.exe`（免安裝，雙擊即用）／ `_x64-setup.exe`（安裝版）／ `.msi`

            功能：永遠最上層、可拖曳縮放、自動隱藏網址列、🎬 只看影片、三大服務捷徑、老闆鍵。
          releaseDraft: false
          prerelease: false

      - name: Upload portable exe (Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # 固定檔名（不含版號），方便用 releases/latest/download 做永久連結
          cp "src-tauri/target/release/yt-float.exe" "YT-Float-portable-x64.exe"
          gh release upload "$TAG" "YT-Float-portable-x64.exe" --clobber --repo "$GITHUB_REPOSITORY"

